<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6B35">
<title>ガチャガチャマップ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#FF6B35;--surface:#fff;--surface2:#f8f9fa;
  --border:#e5e7eb;--text:#111827;--text2:#6b7280;
  --green:#22c55e;--yellow:#f59e0b;--grey:#9ca3af;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,.12);
}
html,body,#app{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:var(--text);background:var(--surface2)}
button{cursor:pointer;font-family:inherit;background:none;border:none}
img{display:block;max-width:100%}

/* Shell */
#app{display:flex;flex-direction:column}
header{background:var(--primary);color:#fff;flex-shrink:0;box-shadow:var(--shadow)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700}
.logo-icon{font-size:24px}
.hdr-search-btn{background:rgba(255,255,255,.2);border-radius:50%;width:36px;height:36px;font-size:18px;display:flex;align-items:center;justify-content:center}
.search-bar{padding:8px 16px 12px;position:relative}
.search-bar input{width:100%;padding:10px 40px 10px 16px;border-radius:24px;border:none;background:rgba(255,255,255,.95);font-size:15px;outline:none}
main{flex:1;overflow:hidden;position:relative}
nav{display:flex;height:60px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;z-index:10}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text2);font-size:10px;padding:8px 4px;border:none;background:none;cursor:pointer}
.nav-item.active{color:var(--primary)}
.nav-icon{font-size:22px}

/* Pages */
.page{display:none;height:100%;overflow-y:auto}
.page.active{display:block}

/* === MAP PAGE === */
#page-map{overflow:hidden;display:none;flex-direction:column}
#page-map.active{display:flex}
.map-area{flex:1;position:relative;background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 30%,#a5f3fc 60%,#d1fae5 100%);overflow:hidden}

/* SVG map background roads */
.map-bg{position:absolute;inset:0;opacity:.3}

/* City zones */
.city-zone{position:absolute;border-radius:8px;opacity:.15}
.zone-tokyo{top:20%;left:55%;width:25%;height:20%;background:#3b82f6}
.zone-osaka{top:55%;left:15%;width:20%;height:18%;background:#8b5cf6}
.zone-yokohama{top:45%;left:50%;width:18%;height:15%;background:#10b981}
.zone-chiba{top:22%;left:72%;width:15%;height:14%;background:#f59e0b}

/* Labels */
.city-label{position:absolute;font-size:10px;font-weight:700;color:#1e40af;opacity:.6;pointer-events:none}

/* Pins */
.pin-wrap{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:5}
.pin-body{width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:3px solid;box-shadow:var(--shadow);transition:transform .15s}
.pin-wrap:hover .pin-body,.pin-wrap.tapped .pin-body{transform:rotate(-45deg) scale(1.2)}
.pin-count{transform:rotate(45deg);color:#fff;font-weight:700;font-size:12px}
.pin-label{background:rgba(0,0,0,.65);color:#fff;font-size:9px;border-radius:4px;padding:1px 4px;white-space:nowrap;margin-top:2px}
.pin-green .pin-body{background:var(--green);border-color:var(--green)}
.pin-yellow .pin-body{background:var(--yellow);border-color:var(--yellow)}
.pin-grey .pin-body{background:var(--grey);border-color:var(--grey)}

/* Legend */
.map-legend{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.9);border-radius:8px;padding:8px 10px;font-size:11px;box-shadow:var(--shadow)}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.legend-item:last-child{margin-bottom:0}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* Near me btn */
.near-me{position:absolute;bottom:20px;right:12px;background:var(--surface);border-radius:24px;padding:8px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--primary)}

/* Filter bar */
.filter-bar{background:var(--surface);padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow)}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap}
.chip{padding:4px 12px;border-radius:20px;border:2px solid var(--border);font-size:12px;font-weight:600;color:var(--text);background:var(--surface);transition:all .15s;cursor:pointer}
.chip.on{color:#fff;border-color:transparent}
.chip-red.on{background:#e11d48}
.chip-blue.on{background:#2563eb}
.chip-green.on{background:#16a34a}

/* === SHEET === */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end}
.sheet-overlay.open{display:flex;animation:fadeIn .2s}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .3s;box-shadow:0 -4px 32px rgba(0,0,0,.18)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;border-bottom:1px solid var(--border)}
.sheet-title{font-size:16px;font-weight:700;flex:1;margin-right:8px}
.sheet-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);font-size:14px;color:var(--text2)}
.sheet-body{flex:1;overflow-y:auto;padding:12px 16px}
.store-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.badge{background:var(--primary);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.store-addr{font-size:13px;color:var(--text2)}
.store-upd{font-size:12px;color:var(--text2);margin-bottom:12px}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:12px}
.tab-btn{flex:1;padding:10px;font-size:14px;font-weight:600;color:var(--text2);border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer}
.tab-btn.on{color:var(--primary);border-bottom-color:var(--primary)}
.tab-content{display:none}
.tab-content.on{display:block}

/* Product list in sheet */
.prod-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.prod-item:last-child{border-bottom:none}
.prod-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.prod-info{flex:1}
.prod-name{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3}
.prod-meta{display:flex;align-items:center;gap:6px}
.mfr-chip{font-size:10px;color:#fff;padding:1px 6px;border-radius:8px;font-weight:700}
.prod-price{font-size:12px;color:var(--primary);font-weight:700}
.conf-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#e0f2fe;color:#0369a1;white-space:nowrap;margin-left:auto}

/* Tweet in sheet */
.tweet{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.tweet-hdr{display:flex;justify-content:space-between;margin-bottom:8px}
.tweet-author{font-weight:700;font-size:14px}
.tweet-time{font-size:12px;color:var(--text2)}
.tweet-text{font-size:14px;line-height:1.5;margin-bottom:8px}
.tweet-img{width:100%;border-radius:8px;margin-bottom:8px;background:var(--surface2);height:160px;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:48px}
.tweet-loc{font-size:12px;color:var(--text2)}
.tweet-likes{font-size:12px;color:#e11d48}

/* === SEARCH PAGE === */
#page-search{padding:0}
#page-search .filter-bar{position:sticky;top:0;z-index:10}
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}
.prod-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.prod-card-img{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.cat-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 6px;border-radius:8px}
.prod-card-body{padding:10px}
.prod-card-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.prod-series{font-size:11px;color:var(--text2)}
.prod-card-name{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:8px}
.prod-card-ft{display:flex;justify-content:space-between;align-items:center}
.prod-big-price{font-size:15px;font-weight:700;color:var(--primary)}
.prod-date{font-size:11px;color:var(--text2)}

/* === LIST PAGE === */
#page-list{padding:12px}
.list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.list-title{font-size:18px;font-weight:700}
.list-count{font-size:13px;color:var(--text2)}
.store-group{margin-bottom:20px}
.grp-label{font-size:14px;font-weight:700;color:var(--text2);padding:8px 4px 6px;border-bottom:2px solid var(--border);margin-bottom:8px}
.store-row{width:100%;display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:8px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);text-align:left;cursor:pointer}
.row-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.row-info{flex:1}
.row-name{font-size:14px;font-weight:600;margin-bottom:2px}
.row-addr{font-size:12px;color:var(--text2);margin-bottom:4px}
.row-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.type-chip{font-size:11px;background:var(--surface2);padding:1px 6px;border-radius:8px;color:var(--text2)}
.prod-count{font-size:12px;color:var(--primary);font-weight:700}
.upd-time{font-size:11px;color:var(--text2)}
.row-arr{font-size:20px;color:var(--text2)}

/* === FEED PAGE === */
#page-feed{padding:12px}
.section-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.release-card{background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border-left:4px solid var(--primary);margin-bottom:12px}
.rel-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rel-mfr{font-size:11px;font-weight:700;background:var(--primary);color:#fff;padding:2px 8px;border-radius:10px}
.rel-date{font-size:12px;color:var(--text2)}
.rel-title{font-size:15px;font-weight:700;margin-bottom:6px}
.rel-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.rel-link{font-size:13px;color:var(--primary);font-weight:600}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<header>
  <div class="hdr">
    <div class="logo"><span class="logo-icon">🎰</span>ガチャガチャマップ</div>
    <button class="hdr-search-btn" onclick="toggleSearch()">🔍</button>
  </div>
  <div class="search-bar" id="searchBar" style="display:none">
    <input type="search" placeholder="商品・シリーズ・メーカーを検索..." oninput="filterProducts(this.value)">
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- MAP PAGE -->
  <div class="page active" id="page-map">
    <div class="filter-bar">
      <div class="filter-row">
        <span class="filter-label">メーカー</span>
        <button class="chip chip-red" onclick="toggleChip(this,'BANDAI')">BANDAI</button>
        <button class="chip chip-blue" onclick="toggleChip(this,'TAKARATOMY')">タカラトミーアーツ</button>
        <button class="chip chip-green" onclick="toggleChip(this,'EPOCH')">EPOCH</button>
      </div>
    </div>
    <div class="map-area" id="mapArea">
      <!-- SVG roads -->
      <svg class="map-bg" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,150 Q100,100 200,150 T400,150" stroke="#93c5fd" stroke-width="8" fill="none"/>
        <path d="M200,0 Q180,150 200,300" stroke="#86efac" stroke-width="6" fill="none"/>
        <path d="M0,80 L400,80" stroke="#fcd34d" stroke-width="4" fill="none"/>
        <path d="M0,220 L400,220" stroke="#fcd34d" stroke-width="4" fill="none"/>
        <path d="M80,0 L80,300" stroke="#c4b5fd" stroke-width="4" fill="none"/>
        <path d="M320,0 L320,300" stroke="#c4b5fd" stroke-width="4" fill="none"/>
        <circle cx="200" cy="150" r="3" fill="#60a5fa"/>
        <circle cx="80" cy="80" r="3" fill="#60a5fa"/>
        <circle cx="320" cy="220" r="3" fill="#60a5fa"/>
      </svg>

      <!-- City labels -->
      <span class="city-label" style="top:18%;left:57%">東京</span>
      <span class="city-label" style="top:57%;left:17%">大阪</span>
      <span class="city-label" style="top:47%;left:52%">横浜</span>
      <span class="city-label" style="top:24%;left:73%">千葉</span>

      <!-- Pins -->
      <div class="pin-wrap pin-green" style="top:26%;left:62%" onclick="openStore('store-002')">
        <div class="pin-body"><span class="pin-count">5</span></div>
        <div class="pin-label">千代田区</div>
      </div>
      <div class="pin-wrap pin-green" style="top:38%;left:55%" onclick="openStore('store-005')">
        <div class="pin-body"><span class="pin-count">3</span></div>
        <div class="pin-label">渋谷区</div>
      </div>
      <div class="pin-wrap pin-yellow" style="top:22%;left:58%" onclick="openStore('store-004')">
        <div class="pin-body"><span class="pin-count">2</span></div>
        <div class="pin-label">豊島区</div>
      </div>
      <div class="pin-wrap pin-yellow" style="top:48%;left:53%" onclick="openStore('store-003')">
        <div class="pin-body"><span class="pin-count">2</span></div>
        <div class="pin-label">渋谷区</div>
      </div>
      <div class="pin-wrap pin-green" style="top:60%;left:20%" onclick="openStore('store-006')">
        <div class="pin-body"><span class="pin-count">3</span></div>
        <div class="pin-label">大阪市</div>
      </div>
      <div class="pin-wrap pin-green" style="top:54%;left:24%" onclick="openStore('store-007')">
        <div class="pin-body"><span class="pin-count">2</span></div>
        <div class="pin-label">大阪市</div>
      </div>
      <div class="pin-wrap pin-yellow" style="top:50%;left:44%" onclick="openStore('store-008')">
        <div class="pin-body"><span class="pin-count">2</span></div>
        <div class="pin-label">横浜市</div>
      </div>
      <div class="pin-wrap pin-grey" style="top:28%;left:75%" onclick="openStore('store-001')">
        <div class="pin-body"><span class="pin-count">3</span></div>
        <div class="pin-label">千葉市</div>
      </div>

      <!-- Legend -->
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>48時間以内</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>1週間以内</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--grey)"></div>それ以降</div>
      </div>

      <!-- Near me -->
      <button class="near-me">📍 現在地</button>
    </div>
  </div>

  <!-- SEARCH PAGE -->
  <div class="page" id="page-search">
    <div class="filter-bar" style="position:sticky;top:0;z-index:10">
      <div class="filter-row">
        <span class="filter-label">メーカー</span>
        <button class="chip chip-red" onclick="toggleChip(this,'BANDAI')">BANDAI</button>
        <button class="chip chip-blue" onclick="toggleChip(this,'TAKARATOMY')">タカラトミーアーツ</button>
        <button class="chip chip-green" onclick="toggleChip(this,'EPOCH')">EPOCH</button>
      </div>
    </div>
    <div class="prod-grid" id="prodGrid"></div>
  </div>

  <!-- LIST PAGE -->
  <div class="page" id="page-list">
    <div class="list-hdr"><h2 class="list-title">店舗一覧</h2><span class="list-count">8件</span></div>
    <div id="storeList"></div>
  </div>

  <!-- FEED PAGE -->
  <div class="page" id="page-feed">
    <div style="margin-bottom:24px">
      <h2 class="section-title"><span>🆕</span>最新リリース情報</h2>
      <div id="releaseList"></div>
    </div>
    <div>
      <h2 class="section-title"><span>📣</span>SNS口コミ 新着</h2>
      <div id="feedList"></div>
    </div>
  </div>

</main>

<!-- BOTTOM NAV -->
<nav>
  <button class="nav-item active" onclick="gotoPage('map',this)"><span class="nav-icon">🗺️</span>マップ</button>
  <button class="nav-item" onclick="gotoPage('search',this)"><span class="nav-icon">🔍</span>商品検索</button>
  <button class="nav-item" onclick="gotoPage('list',this)"><span class="nav-icon">📋</span>店舗一覧</button>
  <button class="nav-item" onclick="gotoPage('feed',this)"><span class="nav-icon">📣</span>新着</button>
</nav>

</div><!-- /app -->

<!-- STORE BOTTOM SHEET -->
<div class="sheet-overlay" id="storeSheet" onclick="closeStoreIfOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-title" id="sheetTitle"></span>
      <button class="sheet-close" onclick="closeStore()">✕</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

];

const stores = [
  {id:'store-001',name:'イオンモール幕張新都心 ガチャコーナー',addr:'千葉県千葉市美浜区豊砂1-1',pref:'千葉県',type:'ショッピングモール',products:['p1','p3','p4'],upd:'5日前',color:'#9ca3af'},
  {id:'store-002',name:'秋葉原 ガチャポンの森',addr:'東京都千代田区外神田4-3-3',pref:'東京都',type:'専門店',products:['p1','p2','p3','p5','p6'],upd:'11時間前',color:'#22c55e'},
  {id:'store-003',name:'新宿タカシマヤ ガチャガチャ',addr:'東京都渋谷区千駄ヶ谷5-24-2',pref:'東京都',type:'ショッピングモール',products:['p4','p5'],upd:'2日前',color:'#f59e0b'},

  {mfr:'タカラトミーアーツ',date:'2026年5月10日',title:'呪術廻戦 渋谷事変 アクリルスタンドシリーズ 発売',desc:'渋谷事変をテーマにしたアクリルスタンドコレクション。虎杖・五条・宿儺など全8種。'},

  {mfr:'BANDAI',date:'2026年5月15日',title:'ブルーロック 潔世一 ミニフィギュアセット 発売',desc:'ブルーロックより潔世一をメインにしたミニフィギュア。全5種、各500円。'},
];

// ===== INIT =====
let activeFilter = '';
let searchQ = '';

function init(){
  renderProducts();
  renderStoreList();
  renderFeed();
}

// ===== NAV =====
function gotoPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
}

function toggleSearch(){
  const bar = document.getElementById('searchBar');
  bar.style.display = bar.style.display==='none' ? 'block' : 'none';
}

// ===== CHIPS =====
function toggleChip(el, key){
  const wasOn = el.classList.contains('on');
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  if(!wasOn){ el.classList.add('on'); activeFilter=key; }
  else activeFilter='';
  renderProducts();
}

// ===== PRODUCTS =====
function filterProducts(q){ searchQ=q; renderProducts(); }

function renderProducts(){
  const grid = document.getElementById('prodGrid');
  let list = products;
  if(activeFilter) list = list.filter(p=>p.mfrKey===activeFilter);
  if(searchQ) list = list.filter(p=>p.name.includes(searchQ)||p.series.includes(searchQ)||p.mfr.includes(searchQ));
  grid.innerHTML = list.map(p=>`
    <div class="prod-card">
      <div class="prod-card-img">${p.emoji}<span class="cat-badge">${p.cat}</span></div>
      <div class="prod-card-body">
        <div class="prod-card-hdr">
          <span class="mfr-chip" style="background:${p.mfrColor}">${p.mfr}</span>
          <span class="prod-series">${p.series}</span>
        </div>
        <div class="prod-card-name">${p.name}</div>
        <div class="prod-card-ft">
          <span class="prod-big-price">¥${p.price}</span>
          <span class="prod-date">発売: ${p.releaseDate}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// ===== STORE LIST =====
function renderStoreList(){
  const grouped = {};
  stores.forEach(s=>{ (grouped[s.pref]=grouped[s.pref]||[]).push(s); });
  document.getElementById('storeList').innerHTML = Object.entries(grouped).map(([pref,list])=>`
    <div class="store-group">
      <div class="grp-label">${pref}</div>
      ${list.map(s=>`
        <button class="store-row" onclick="openStore('${s.id}')">
          <div class="row-dot" style="background:${s.color}"></div>
          <div class="row-info">
            <div class="row-name">${s.name}</div>
            <div class="row-addr">${s.addr}</div>
            <div class="row-meta">
              <span class="type-chip">${s.type}</span>
              <span class="prod-count">${s.products.length}種類</span>
              <span class="upd-time">${s.upd}</span>
            </div>
          </div>
          <span class="row-arr">›</span>
        </button>
      `).join('')}
    </div>
  `).join('');
}

// ===== FEED =====
function renderFeed(){
  document.getElementById('releaseList').innerHTML = releases.map(r=>`
    <div class="release-card">
      <div class="rel-hdr"><span class="rel-mfr">${r.mfr}</span><span class="rel-date">${r.date}</span></div>
      <div class="rel-title">${r.title}</div>
      <div class="rel-desc">${r.desc}</div>
      <span class="rel-link">公式ページを確認 →</span>
    </div>
  `).join('');

  document.getElementById('feedList').innerHTML = snsPosts.map(p=>`
    <div class="tweet">
      <div class="tweet-hdr">
        <span class="tweet-author">${p.platform} ${p.author}</span>
        <span class="tweet-likes">♥ ${p.likes}</span>
      </div>
      <div class="tweet-text">${p.text}</div>
      <div class="tweet-img">${p.emoji}</div>
      <div class="tweet-loc">📍 ${p.loc} · ${p.time}</div>
    </div>
  `).join('');
}

// ===== STORE SHEET =====
function openStore(id){
  const store = stores.find(s=>s.id===id);
  if(!store) return;
  document.getElementById('sheetTitle').textContent = store.name;

  const prods = store.products.map(pid=>products.find(p=>p.id===pid)).filter(Boolean);
  const posts = snsPosts.filter(p=>p.pids.some(pid=>store.products.includes(pid)));
  const conf = ['official','sns','sns','user','sns','official'];

  document.getElementById('sheetBody').innerHTML = `
    <div class="store-meta">
      <span class="badge">${store.type}</span>
      <span class="store-addr">${store.addr}</span>
    </div>
    <div class="store-upd">最終更新: ${store.upd}</div>
    <div class="tabs">
      <button class="tab-btn on" onclick="switchTab(this,'tab-prod')">商品 (${prods.length})</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-sns')">SNS口コミ</button>
    </div>
    <div class="tab-content on" id="tab-prod">
      ${prods.map((p,i)=>`
        <div class="prod-item">
          <div class="prod-thumb">${p.emoji}</div>
          <div class="prod-info">
            <div class="prod-name">${p.name}</div>
            <div class="prod-meta">
              <span class="mfr-chip" style="background:${p.mfrColor}">${p.mfr}</span>
              <span class="prod-price">¥${p.price}</span>
            </div>
          </div>
          <span class="conf-badge">${conf[i]||'sns'}確認</span>
        </div>
      `).join('')}
    </div>
    <div class="tab-content" id="tab-sns">
      ${posts.length===0 ? '<p style="text-align:center;color:var(--text2);padding:24px">SNS投稿がまだありません</p>' :
        posts.map(p=>`
          <div class="tweet">
            <div class="tweet-hdr">
              <span class="tweet-author">${p.platform} ${p.author}</span>
              <span class="tweet-likes">♥ ${p.likes}</span>
            </div>
            <div class="tweet-text">${p.text}</div>
            <div class="tweet-img">${p.emoji}</div>
            <div class="tweet-loc">📍 ${p.loc} · ${p.time}</div>
          </div>
        `).join('')
      }
    </div>
  `;

  document.getElementById('storeSheet').classList.add('open');
}

function switchTab(btn, tabId){
  btn.closest('.sheet-body').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  btn.closest('.sheet-body').querySelectorAll('.tab-content').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(tabId).classList.add('on');
}

function closeStore(){
  document.getElementById('storeSheet').classList.remove('open');
}

function closeStoreIfOverlay(e){
  if(e.target===document.getElementById('storeSheet')) closeStore();
}

init();
</script>
